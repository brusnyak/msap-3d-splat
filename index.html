<script type="module">
import * as SPLAT from 'gsplat';

let scene, camera, renderer, controls;
let loadedSplats = {};
let activeSplat = null;
let isAutoRotating = false;
let activeModelIndex = null;
let currentSplatId = null;
let isDark = true;
let initialDistances = { 0: 8, 1: 1.5, 2: 2 };

const keys = { w: false, a: false, s: false, d: false, q: false, e: false, shift: false };
let flySpeed = 0.03;
let mouseDown = false;
let lastMouseX = 0, lastMouseY = 0;
let yaw = 0, pitch = 0;
let lastTime = performance.now();

const models = [
  { name: 'Room', path: 'models/room.splat' },
  { name: 'Head', path: 'models/head.splat' },
  { name: 'Object', path: 'models/object.splat' }
];

async function init() {
  console.log('Initializing gsplat.js viewer...');
  
  const canvas = document.getElementById('three-canvas');
  
  scene = new SPLAT.Scene();
  
  camera = new SPLAT.Camera();
  camera.fov = 60;
  camera.aspect = window.innerWidth / window.innerHeight;
  
  renderer = new SPLAT.WebGLRenderer(canvas);
  renderer.setSize(window.innerWidth, window.innerHeight);
  
  setupFlyControls(canvas);
  window.addEventListener('resize', onWindowResize);
  
  await loadModel(1);
  animate();
  setupUI();
  
  console.log('Viewer initialized');
}

function setupFlyControls(canvas) {
  const handleStart = (x, y, e) => {
    if (e) e.preventDefault();
    mouseDown = true;
    lastMouseX = x;
    lastMouseY = y;
    canvas.style.cursor = 'grabbing';
  };
  
  const handleMove = (x, y) => {
    if (!mouseDown) return;
    const dx = x - lastMouseX;
    const dy = y - lastMouseY;
    yaw -= dx * 0.005;
    pitch -= dy * 0.005;
    pitch = Math.max(-Math.PI/2 + 0.01, Math.min(Math.PI/2 - 0.01, pitch));
    lastMouseX = x;
    lastMouseY = y;
  };
  
  const handleEnd = () => {
    mouseDown = false;
    canvas.style.cursor = 'grab';
  };
  
  canvas.addEventListener('mousedown', (e) => {
    if (e.button === 0) handleStart(e.clientX, e.clientY, e);
  });
  
  canvas.addEventListener('mousemove', (e) => {
    handleMove(e.clientX, e.clientY);
  });
  
  canvas.addEventListener('mouseup', handleEnd);
  canvas.addEventListener('mouseleave', handleEnd);
  
  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      handleStart(e.touches[0].clientX, e.touches[0].clientY, e);
    }
  }, { passive: false });
  
  canvas.addEventListener('touchmove', (e) => {
    if (e.touches.length === 1) {
      handleMove(e.touches[0].clientX, e.touches[0].clientY);
    }
  }, { passive: false });
  
  canvas.addEventListener('touchend', handleEnd);
  
  canvas.style.cursor = 'grab';
  
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    flySpeed = Math.max(0.01, Math.min(1, flySpeed * (e.deltaY > 0 ? 0.9 : 1.1)));
  }, { passive: false });
  
  window.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    const key = e.key.toLowerCase();
    if (key === 'w') keys.w = true;
    if (key === 'a') keys.a = true;
    if (key === 's') keys.s = true;
    if (key === 'd') keys.d = true;
    if (key === 'q') keys.q = true;
    if (key === 'e') keys.e = true;
    if (key === 'shift') keys.shift = true;
  });
  
  window.addEventListener('keyup', (e) => {
    const key = e.key.toLowerCase();
    if (key === 'w') keys.w = false;
    if (key === 'a') keys.a = false;
    if (key === 's') keys.s = false;
    if (key === 'd') keys.d = false;
    if (key === 'q') keys.q = false;
    if (key === 'e') keys.e = false;
    if (key === 'shift') keys.shift = false;
  });
  
  canvas.style.cursor = 'grab';
}

function updateFlyCamera(deltaTime) {
  const speed = flySpeed * (deltaTime / 16.667);
  const shiftMultiplier = keys.shift ? 3 : 1;
  const actualSpeed = speed * shiftMultiplier;
  
  const forward = new SPLAT.Vector3(Math.sin(yaw) * Math.cos(pitch), Math.sin(pitch), Math.cos(yaw) * Math.cos(pitch));
  const right = new SPLAT.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
  
  if (keys.w) { camera.position.x += forward.x * actualSpeed; camera.position.y += forward.y * actualSpeed; camera.position.z += forward.z * actualSpeed; }
  if (keys.s) { camera.position.x -= forward.x * actualSpeed; camera.position.y -= forward.y * actualSpeed; camera.position.z -= forward.z * actualSpeed; }
  if (keys.a) { camera.position.x -= right.x * actualSpeed; camera.position.z -= right.z * actualSpeed; }
  if (keys.d) { camera.position.x += right.x * actualSpeed; camera.position.z += right.z * actualSpeed; }
  if (keys.q) { camera.position.y -= actualSpeed; }
  if (keys.e) { camera.position.y += actualSpeed; }
  
  const yawQuat = SPLAT.Quaternion.FromEuler(new SPLAT.Vector3(0, yaw, 0));
  const pitchQuat = SPLAT.Quaternion.FromEuler(new SPLAT.Vector3(pitch, 0, 0));
  camera.rotation = yawQuat.multiply(pitchQuat);
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function showLoader() {
  document.getElementById('loader').style.opacity = '1';
}

function hideLoader() {
  document.getElementById('loader').style.opacity = '0';
}

function updateCoordinateDisplay() {
  if (!camera || !camera.position) return;
  
  const pos = camera.position;
  const rotY = Math.round(-Math.atan2(pos.x, pos.z) * 180 / Math.PI);
  const rotX = Math.round(-Math.atan2(pos.y, Math.sqrt(pos.x * pos.x + pos.z * pos.z)) * 180 / Math.PI);
  
  const yEl = document.getElementById('rot-y');
  const xEl = document.getElementById('rot-x');
  if (yEl) yEl.textContent = (rotY >= 0 ? '+' : '') + rotY + '°';
  if (xEl) xEl.textContent = (rotX >= 0 ? '+' : '') + rotX + '°';
}

let sceneId = 0;

function getPointCount(splat) {
  if (!splat) return 0;
  if (typeof splat.data?.vertexCount === 'number') return splat.data.vertexCount;
  if (typeof splat.vertexCount === 'number') return splat.vertexCount;
  if (typeof splat.pointCount === 'number') return splat.pointCount;
  return 0;
}

async function loadModel(index) {
  if (activeModelIndex === index && currentSplatId === index) return;
  
  showLoader();
  activeModelIndex = index;
  
  try {
    const model = models[index];
    
    scene = new SPLAT.Scene();
    sceneId++;
    
    console.log('Loading model:', model.name, 'from:', model.path);
    const newSplat = await SPLAT.Loader.LoadAsync(model.path, scene, () => {});
    loadedSplats[index] = newSplat;
    
    currentSplatId = index;
    activeSplat = newSplat;
    
    const count = getPointCount(newSplat);
    
    document.getElementById('point-count').textContent = 
      count > 1000000 ? (count / 1000000).toFixed(1) + 'M' : 
      count > 1000 ? (count / 1000).toFixed(1) + 'K' : count;
    
    const dist = initialDistances[index] || 2;
    const center = newSplat.bounds ? newSplat.bounds.center() : new SPLAT.Vector3(0, 0, 0);
    const size = newSplat.bounds ? newSplat.bounds.size() : new SPLAT.Vector3(1, 1, 1);
    const maxDim = Math.max(size.x, size.y, size.z);
    const cameraDist = Math.max(maxDim * 1.5, dist);
    camera.position = new SPLAT.Vector3(center.x, center.y, center.z - cameraDist);
    yaw = 0;
    pitch = 0;
    camera.rotation = SPLAT.Quaternion.FromEuler(new SPLAT.Vector3(pitch, yaw, 0));
    
    console.log('Loaded:', model.name);
    
  } catch (e) {
    console.error('Load error:', e);
    document.getElementById('point-count').textContent = 'Error';
  }
  
  hideLoader();
  updateNavUI(index);
}

function updateNavUI(index) {
  const buttons = document.querySelectorAll('nav button[data-model]');
  buttons.forEach((btn, i) => {
    if (i === index) {
      btn.classList.add('bg-primary', 'text-on-primary', 'scale-105', 'shadow-xl');
      btn.classList.remove('text-on-surface-variant');
    } else {
      btn.classList.remove('bg-primary', 'text-on-primary', 'scale-105', 'shadow-xl');
      btn.classList.add('text-on-surface-variant');
    }
  });
}

function resetCamera() {
  if (!camera || !loadedSplats[activeModelIndex]) return;
  const splat = loadedSplats[activeModelIndex];
  const center = splat.bounds ? splat.bounds.center() : new SPLAT.Vector3(0, 0, 0);
  const size = splat.bounds ? splat.bounds.size() : new SPLAT.Vector3(1, 1, 1);
  const maxDim = Math.max(size.x, size.y, size.z);
  const dist = Math.max(maxDim * 1.5, initialDistances[activeModelIndex] || 2);
  camera.position = new SPLAT.Vector3(center.x, center.y, center.z - dist);
  yaw = 0;
  pitch = 0;
  camera.rotation = SPLAT.Quaternion.FromEuler(new SPLAT.Vector3(pitch, yaw, 0));
  flySpeed = 0.03;
  isAutoRotating = false;
  const rotateBtn = document.getElementById('btn-rotate');
  if (rotateBtn) {
    rotateBtn.classList.remove('bg-primary', 'text-on-primary');
    rotateBtn.classList.add('text-on-surface-variant');
  }
}

function centerView() {
  resetCamera();
}

function zoomIn() {
  if (!camera || !loadedSplats[activeModelIndex]) return;
  const pos = camera.position;
  const target = loadedSplats[activeModelIndex].bounds?.center() || new SPLAT.Vector3(0, 0, 0);
  const dir = pos.subtract(target);
  const newPos = target.add(dir.multiply(0.7));
  camera.position = newPos;
}

function zoomOut() {
  if (!camera || !loadedSplats[activeModelIndex]) return;
  const pos = camera.position;
  const target = loadedSplats[activeModelIndex].bounds?.center() || new SPLAT.Vector3(0, 0, 0);
  const dir = pos.subtract(target);
  const newPos = target.add(dir.multiply(1.4));
  camera.position = newPos;
}

function toggleTheme() {
  isDark = !isDark;
  const html = document.documentElement;
  if (isDark) {
    html.classList.remove('light');
    html.classList.add('dark');
  } else {
    html.classList.remove('dark');
    html.classList.add('light');
  }
  const icon = document.getElementById('theme-icon');
  if (icon) {
    icon.textContent = isDark ? 'light_mode' : 'dark_mode';
  }
  document.body.style.backgroundColor = isDark ? '#121414' : '#f8f8f8';
}

function animate() {
  function loop() {
    const now = performance.now();
    const deltaTime = now - lastTime;
    lastTime = now;
    
    requestAnimationFrame(loop);
    updateFlyCamera(deltaTime);
    
    if (isAutoRotating && camera && activeSplat) {
      const time = Date.now() * 0.001;
      const center = activeSplat.bounds?.center() || new SPLAT.Vector3(0, 0, 0);
      const size = activeSplat.bounds?.size() || new SPLAT.Vector3(1, 1, 1);
      const maxDim = Math.max(size.x, size.y, size.z);
      const dist = Math.max(maxDim * 1.5, initialDistances[activeModelIndex] || 2);
      camera.position.x = center.x + Math.sin(time * 0.5) * dist;
      camera.position.z = center.z - Math.cos(time * 0.5) * dist;
      camera.position.y = center.y + Math.sin(time * 0.3) * 0.5;
      yaw = -time * 0.5;
      pitch = Math.sin(time * 0.3) * 0.3;
      camera.rotation = SPLAT.Quaternion.FromEuler(new SPLAT.Vector3(pitch, yaw, 0));
    }
    
    renderer.render(scene, camera);
    updateCoordinateDisplay();
  }
  loop();
}

function showInfoModal() {
  const modal = document.createElement('div');
  modal.className = 'fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4';
  modal.innerHTML = `
    <div class="bg-surface-container p-6 rounded-2xl max-w-sm w-full border border-white/10">
      <h3 class="text-title-lg text-primary mb-4">3D Gaussian Splat Viewer</h3>
      <p class="text-on-surface text-sm mb-4">Interactive viewer for Gaussian Splatting 3D models.</p>
      <div class="space-y-2 text-sm text-on-surface-variant">
        <p><strong>Controls:</strong></p>
        <p>• W/A/S/D - Move forward/left/back/right</p>
        <p>• Q/E - Move down/up</p>
        <p>• Mouse drag - Look around</p>
        <p>• Scroll - Adjust speed</p>
        <p>• Shift - Fast movement</p>
      </div>
      <div class="mt-4 pt-4 border-t border-white/10">
        <p class="text-xs text-on-surface-variant">Built with gsplat.js</p>
        <p class="text-xs text-on-surface-variant">Format: .splat (Gaussian Splatting)</p>
      </div>
      <button class="mt-4 w-full py-2 bg-primary text-on-primary rounded-lg hover:opacity-90" id="modal-close">Close</button>
    </div>
  `;
  document.body.appendChild(modal);
  
  document.getElementById('modal-close').addEventListener('click', () => {
    document.body.removeChild(modal);
  });
  
  modal.addEventListener('click', (e) => {
    if (e.target === modal) document.body.removeChild(modal);
  });
}

function setupUI() {
  // Model selection
  document.querySelectorAll('nav button[data-model]').forEach((btn, index) => {
    btn.addEventListener('click', () => loadModel(index));
  });
  
  // Reset camera
  document.getElementById('btn-reset-camera').addEventListener('click', resetCamera);
  
  // Rotate toggle
  document.getElementById('btn-rotate').addEventListener('click', function() {
    isAutoRotating = !isAutoRotating;
    if (isAutoRotating) {
      this.classList.add('bg-primary', 'text-on-primary');
      this.classList.remove('text-on-surface-variant');
    } else {
      this.classList.remove('bg-primary', 'text-on-primary');
      this.classList.add('text-on-surface-variant');
    }
  });
  
  // Zoom controls
  document.getElementById('btn-zoom-in').addEventListener('click', zoomIn);
  document.getElementById('btn-zoom-out').addEventListener('click', zoomOut);
  
  // Reset view
  document.getElementById('btn-reset-view').addEventListener('click', centerView);
  
  // Fullscreen
  document.getElementById('btn-fullscreen').addEventListener('click', () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  });
  
  // Theme toggle
  document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
  
  // Info button
  document.getElementById('btn-info').addEventListener('click', showInfoModal);
}

window.onload = init;
</script>

</body></html>
